
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAP Business Card</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e5e5e5;
    font-family:'Segoe UI', Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:85vw;
    max-width:850px;

    aspect-ratio:85/55;

    height:auto;

    background:#faf8f3;
    border-radius:8px;
}

.logo-block{
    display:flex;
    align-items:flex-start;
    padding-left:20px;
}

.logo-block img{
    width:160px;
    height:auto;
    object-fit:contain;
    margin-top:10px;
}

.identity{
    padding-left:60px;
    padding-top:20px;
}

.name{
    font-size:56px;
    color:#222;
    font-weight:300;
    margin-bottom:20px;
}

.name strong{
    font-weight:700;
}

.position{
    font-size:34px;
    color:#333;
    line-height:1.2;
}

.address{
    align-self:end;
    font-size:28px;
    color:#333;
    line-height:1.35;
    padding-left:20px;
}

.website{
    margin-top:20px;
    color:#f26b21;
    font-size:28px;
}

.contact{
    align-self:end;
    padding-left:60px;
}

.contact-item{
    display:flex;
    align-items:center;
    margin-bottom:25px;
    font-size:28px;
    color:#222;
}

.icon{
    width:55px;
    text-align:center;
    margin-right:25px;
    font-size:30px;
}

@media(max-width:1200px){

.card{
    width:95%;
    height:auto;
    grid-template-columns:1fr;
    grid-template-rows:auto;
    gap:40px;
}

.identity,
.contact{
    padding-left:0;
}

.logo-block img{
    width:140px;
}

.name{
    font-size:40px;
}

.position{
    font-size:24px;
}

.address,
.contact-item{
    font-size:20px;
}

}

</style>
</head>

<body>

<div class="card">

    <div class="logo-block">
        <img src="sonatrach_logo.png" alt="Sonatrach IAP">
    </div>

    <div class="identity">

        <div class="name">
            Amel <strong>LOUGHRAIEB</strong>
        </div>

        <div class="position">
            Senior officer in charge of<br>
            partnership
        </div>

    </div>

    <div class="address">

        SONATRACH / Institut<br>
        Algérien du Pétrole (IAP)<br>
        Avenue du 1er Novembre<br>
        Boumerdès 35000, Algérie

        <div class="website">
            https://sonatrach.com/
        </div>

    </div>

    <div class="contact">

        <div class="contact-item">
            <span class="icon">☎</span>
            +213 (0) 24 79 57 00
        </div>

        <div class="contact-item">
            <span class="icon">📱</span>
            +213 (0) 670 382 184
        </div>

        <div class="contact-item">
            <span class="icon">🖨</span>
            +213 (0) 24 79 57 21
        </div>

        <div class="contact-item">
            <span class="icon">✉</span>
            amel.loughraieb@sonatrach.dz
        </div>

    </div>

</div>

</body>
</html>
